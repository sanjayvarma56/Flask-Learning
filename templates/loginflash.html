<!DOCTYPE html>
<html>
    <body>
        <h1>Login</h1>
        {% if error %}
        <p><strong>Error:</strong>{{ error }}</p>
        {% endif %}
        <form method="post" action="{{ url_for('login') }}">
            <dl>
                <dt>Username:</dt>
                <dd><input type="text" name="username"></dd>
                <dt>Password:</dt>
                <dd><input type="password" name="password"></dd>
            </dl>
            <p><input type="submit" value="Login"></p>
        </form>
    </body>
</html>
